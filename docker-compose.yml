services:
  db:
    image: postgres:16-alpine
    container_name: pythia-db
    environment:
      POSTGRES_USER: pythia
      POSTGRES_PASSWORD: pythia
      POSTGRES_DB: pythia
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pythia"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pythia-backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://pythia:pythia@db:5432/pythia
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000

  telegram:
    build:
      context: ./telegram
      dockerfile: Dockerfile
    container_name: pythia-telegram
    env_file: .env
    environment:
      API_BASE_URL: http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
